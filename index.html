<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bot & Bank: AI Tycoon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  body { background: #05080f; color: #e6f0ff; font-family: 'Courier New', monospace; overflow: hidden; }
  #game { display: block; margin: 0 auto; background: #0a1628; image-rendering: pixelated; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
  #ui > * { pointer-events: auto; }
  .hud { display: flex; justify-content: space-between; padding: 8px 12px; background: rgba(0,0,0,0.6); }
  .credits { font-size: 18px; color: #00ff99; font-weight: bold; }
  .rate { font-size: 11px; color: #88aacc; }
  .room-name { color: #00d4ff; font-size: 12px; letter-spacing: 1px; }
  #quests { position: absolute; top: 50px; left: 10px; background: rgba(0,20,40,0.85); border: 1px solid #003355; padding: 8px; border-radius: 6px; font-size: 11px; max-width: 220px; }
  .quest { padding: 2px 0; color: #aaccff; }
  .quest.done { color: #00ff99; }
  #dialog { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); border: 2px solid #00d4ff; padding: 12px 18px; border-radius: 8px; font-size: 13px; max-width: 90%; text-align: center; display: none; }
  #dialog button { margin-top: 8px; padding: 6px 14px; background: #00d4ff; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: inherit; }
  #controls { position: absolute; bottom: 10px; right: 10px; font-size: 10px; color: #6688aa; text-align: right; }
  .brand { position: absolute; bottom: 4px; left: 10px; font-size: 10px; color: #ff00ff; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="hud">
    <div>
      <div class="credits" id="credits">0 CREDITS</div>
      <div class="rate" id="rate">0 / sec</div>
    </div>
    <div class="room-name" id="room">LOBBY</div>
    <div style="text-align:right;">
      <div style="font-size:11px;color:#ff00ff;">⭐ <span id="pp">0</span> PP</div>
      <div style="font-size:10px;color:#888;">Press E to interact</div>
    </div>
  </div>
  <div id="quests"></div>
  <div id="dialog"></div>
  <div id="controls">WASD / Arrows = move<br>E = interact<br>1-4 = quick buy</div>
  <div class="brand">@NeuralNetWorth</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 720;
canvas.width = W; canvas.height = H;

// ==================== WORLD ====================
const TILE = 32;
const MAP = [
  "####################",
  "#S     L        R  #",
  "#  ###  ###  ###   #",
  "#  #     #     #   #",
  "#  #  O  #  M  #   #",
  "#     ###  ###     #",
  "#  ###        ###  #",
  "#  #   T      #    #",
  "#  #  ###  ### #   #",
  "#     #     #      #",
  "#  O  #  O  #      #",
  "#     #     #      #",
  "####################",
];
const ROOMS = { 'S': { name: 'STARTUP LOBBY', color: '#0a1628' }, 'L': { name: 'LEAD DEV BAY', color: '#001222' }, 'R': { name: 'RESEARCH LAB', color: '#1a0030' }, 'O': { name: 'OPEN OFFICE', color: '#001a12' }, 'M': { name: 'SERVER ROOM', color: '#12001a' }, 'T': { name: 'TERMINAL', color: '#000000' } };

let player = { x: 2*TILE, y: 2*TILE, speed: 3, dir: {x:0,y:1}, moving: false, frame: 0 };
let camera = { x: 0, y: 0 };
let keys = {};
let near = null;
let dialogOpen = false;
let showQuests = true;

let credits = 0, totalEarned = 0, rate = 0, prestigeMultiplier = 1, prestigePoints = 0;
let lastTick = Date.now();
let lastSave = Date.now();

let agents = [
  { id:0, base:1, cost:10, owned:0, name:"Support Bot", icon:"💬", color:"#00d4ff" },
  { id:1, base:3, cost:50, owned:0, name:"Email Agent", icon:"📧", color:"#00ff99" },
  { id:2, base:8, cost:200, owned:0, name:"Content Worker", icon:"📱", color:"#ffaa00" },
  { id:3, base:20, cost:1000, owned:0, name:"Video Editor AI", icon:"🎬", color:"#ff00ff" },
  { id:4, base:65, cost:5000, owned:0, name:"Analytics Bot", icon:"📊", color:"#ff4444", locked:true },
  { id:5, base:300, cost:25000, owned:0, name:"Chief AI Officer", icon:"🧠", color:"#ffff00", locked:true },
];

let upgrades = [
  { id:0, cost:500, bought:false, name:"Overclock", desc:"+20% ALL rates", icon:"⚡" },
  { id:1, cost:2000, bought:false, name:"Server Room", desc:"Unlock Analytics", icon:"🏢" },
  { id:2, cost:10000, bought:false, name:"Research Lab", desc:"Unlock CAIO", icon:"🔬" },
  { id:3, cost:200, bought:false, name:"Keyboard", desc:"+50% click power", icon:"⌨️" },
];

let missions = [
  { id:0, name:"Debug Squad", desc:"Own 5 Support Bots", reward:1000, check: () => agents[0].owned >= 5, done:false },
  { id:1, name:"Email Overflow", desc:"Own 10 Email Agents", reward:3000, check: () => agents[1].owned >= 10, done:false },
  { id:2, name:"Content Empire", desc:"Own 20 Content Workers", reward:10000, check: () => agents[2].owned >= 20, done:false },
  { id:3, name:"Video Pipeline", desc:"Own 15 Video Editors", reward:20000, check: () => agents[3].owned >= 15, done:false },
  { id:4, name:"Upgrade Hunter", desc:"Buy 2 upgrades", reward:5000, check: () => upgrades.filter(u=>u.bought).length >= 2, done:false },
  { id:5, name:"First Prestige", desc:"Prestige once", reward:0, check: () => prestigePoints >= 1, done:false },
];

let npcs = [
  { x: 5*TILE, y: 4*TILE, name:"Dev", color:"#00d4ff", dialog: ["Welcome to Bot & Bank!","Walk to colored tiles to interact.","Press E near objects."] },
  { x: 11*TILE, y: 2*TILE, name:"CEO", color:"#ff00ff", dialog: ["You're here to build, not browse.","Buy agents. Deploy them. Scale."] },
  { x: 7*TILE, y: 10*TILE, name:"Ops", color:"#00ff99", dialog: ["Keep the servers cool.","Unlock new rooms by buying upgrades."] },
];

let interactables = [
  { x: 4*TILE, y: 2*TILE, w: TILE, h: TILE, label: "Laptop", color: "#00d4ff", quest: 100, click: 1 },
  { x: 12*TILE, y: 4*TILE, w: TILE, h: TILE, label: "Terminal", color: "#ff00ff", quest: 25 },
  { x: 2*TILE, y: 8*TILE, w: TILE, h: TILE, label: "Server Rack", color: "#00ff99", auto: true },
  { x: 6*TILE, y: 5*TILE, w: TILE, h: TILE, label: "Whiteboard", color: "#ffaa00", upgrade: true },
  { x: 9*TILE, y: 9*TILE, w: TILE, h: TILE, label: "Coffee", color: "#ff4444", boost: 30 },
];

let particles = [];
let screenShake = 0;

// ==================== INPUT ====================
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.key.toLowerCase() === 'e') interact(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width) + camera.x;
  const my = (e.clientY - rect.top) * (H / rect.height) + camera.y;
  // quick click near player = earn
  const dx = mx - (player.x + TILE/2), dy = my - (player.y + TILE/2);
  if (Math.sqrt(dx*dx+dy*dy) < TILE*2) earn();
});

// ==================== CORE ====================
function recalc() {
  rate = 0;
  agents.forEach(a => { rate += a.base * a.owned * prestigeMultiplier; });
  rate = Math.floor(rate);
}

function format(n) {
  if (n >= 1e15) return (n/1e15).toFixed(1) + ' Q';
  if (n >= 1e12) return (n/1e12).toFixed(1) + ' T';
  if (n >= 1e9) return (n/1e9).toFixed(1) + ' B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + ' M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + ' K';
  return Math.floor(n).toString();
}

function earn(amt = 1) {
  const clickAmt = Math.max(1, Math.floor(1 + rate * 0.05)) * (upgrades[3]?.bought ? 2 : 1);
  credits += clickAmt;
  totalEarned += clickAmt;
  screenShake = 3;
  spawnParticles(player.x + TILE/2, player.y + TILE/2, 6);
  updateHUD();
  recalc();
  checkMissions();
  saveGame();
}

function buyAgent(i) {
  const a = agents[i];
  const c = Math.floor(a.cost * Math.pow(1.15, a.owned));
  if (credits < c || a.locked) return;
  credits -= c;
  a.owned++;
  screenShake = 2;
  spawnParticles(player.x + TILE/2, player.y + TILE/2, 10);
  showToast('🚀 ' + a.name + ' hired!');
  recalc(); updateHUD(); checkMissions(); saveGame();
}

function buyUpgrade(i) {
  const u = upgrades[i];
  const c = Math.floor(u.cost * prestigeMultiplier);
  if (u.bought || credits < c) return;
  credits -= c;
  u.bought = true;
  if (i === 1) agents[4].locked = false;
  if (i === 2) agents[5].locked = false;
  showToast('⚡ ' + u.name + ' unlocked!');
  screenShake = 4;
  recalc(); updateHUD(); checkMissions(); saveGame();
}

function interact() {
  if (dialogOpen) { closeDialog(); return; }
  for (const o of interactables) {
    if (rectsOverlap(player.x, player.y, TILE, TILE, o.x, o.y, o.w, o.h)) {
      if (o.quest) { earn(o.quest); showToast('+ ' + format(o.quest) + ' credits'); }
      if (o.click) { earn(o.click); }
      if (o.auto) { showToast('⚡ Bonus passive +5/sec for 30s'); setTimeout(() => {}, 30000); }
      if (o.boost) { showToast('☕ Caffeine rush!'); }
      if (o.upgrade) { showUpgradeMenu(); return; }
      return;
    }
  }
  for (const n of npcs) {
    const dx = player.x + TILE/2 - (n.x + TILE/2), dy = player.y + TILE/2 - (n.y + TILE/2);
    if (Math.sqrt(dx*dx+dy*dy) < TILE*1.8) { openDialog(n.name, n.dialog); return; }
  }
}

function showUpgradeMenu() {
  openDialog("Upgrades", upgrades.map((u,i) => u.bought ? u.name + ": BOUGHT" : u.name + " — " + format(Math.floor(u.cost * prestigeMultiplier)) + " creds").join('\n'));
}

function openDialog(title, lines) {
  dialogOpen = true;
  const d = document.getElementById('dialog');
  d.innerHTML = '<div style="color:#00d4ff;font-weight:bold;margin-bottom:6px;">' + title + '</div>' + lines.join('<br>') + '<br><button onclick="closeDialog()">Close</button><button onclick="dismissAndBuy(event)">Buy</button>';
  d.style.display = 'block';
}

window.dismissAndBuy = function(e) {
  if (!dialogOpen) return;
  const idx = Array.from(document.querySelectorAll('#dialog button')).indexOf(e.target) - 1;
  closeDialog();
  if (idx >= 0 && idx < upgrades.length) buyUpgrade(idx);
};

window.closeDialog = function() { dialogOpen = false; document.getElementById('dialog').style.display = 'none'; };

function checkMissions() {
  missions.forEach(m => { if (!m.done && m.check()) { m.done = true; showToast('🏆 Mission: ' + m.name); } });
}

function spawnParticles(x, y, n) {
  for (let i = 0; i < n; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life:1, color: Math.random()<0.5?'#00d4ff':'#ff00ff', size: Math.random()*2+1 });
  }
}

function showToast(msg) {
  const d = document.getElementById('dialog');
  d.innerHTML = msg + '<br><button onclick="closeDialog()">Close</button>';
  d.style.display = 'block'; dialogOpen = true;
  setTimeout(() => { if (dialogOpen) closeDialog(); }, 2500);
}

function rectsOverlap(x1,y1,w1,h1, x2,y2,w2,h2) {
  return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2;
}

function saveGame() {
  const data = { credits, totalEarned, prestigePoints, prestigeMultiplier, agents, upgrades, missions, lastSave: Date.now() };
  try { localStorage.setItem('botandbank2', JSON.stringify(data)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('botandbank2');
    if (!raw) return;
    const data = JSON.parse(raw);
    credits = data.credits || 0; totalEarned = data.totalEarned || 0;
    prestigePoints = data.prestigePoints || 0; prestigeMultiplier = data.prestigeMultiplier || 1;
    if (data.agents) data.agents.forEach((s,i) => { if (agents[i]) Object.assign(agents[i], s); });
    if (data.upgrades) data.upgrades.forEach((s,i) => { if (upgrades[i]) Object.assign(upgrades[i], s); });
    if (data.missions) data.missions.forEach((s,i) => { if (missions[i]) Object.assign(missions[i], s); });
  } catch(e) {}
}

function updateHUD() {
  document.getElementById('credits').textContent = format(credits) + ' CREDITS';
  document.getElementById('rate').textContent = format(rate) + ' / sec';
  document.getElementById('pp').textContent = prestigePoints;
  let room = 'LOBBY';
  for (const [k,v] of Object.entries(ROOMS)) {
    const rx = k === 'S' ? 1 : MAP[0].indexOf(k);
    if (rx >= 0 && player.x >= rx*TILE && player.x < (rx+8)*TILE) { room = v.name; break; }
  }
  document.getElementById('room').textContent = room;
}

function updateQuests() {
  const q = document.getElementById('quests');
  q.innerHTML = '<div style="color:#00d4ff;margin-bottom:4px;">📜 QUESTS</div>' + missions.map(m => `<div class="quest ${m.done?'done':''}">${m.done?'✅':'🔒'} ${m.name}: ${m.desc}</div>`).join('');
}

// ==================== RENDER ====================
function drawMap() {
  for (let y = 0; y < MAP.length; y++) {
    for (let x = 0; x < MAP[y].length; x++) {
      const ch = MAP[y][x], sx = x*TILE - camera.x, sy = y*TILE - camera.y;
      if (ch === '#') {
        ctx.fillStyle = '#002840'; ctx.fillRect(sx, sy, TILE, TILE);
        ctx.strokeStyle = '#004466'; ctx.strokeRect(sx+2, sy+2, TILE-4, TILE-4);
      } else if (ROOMS[ch]) {
        ctx.fillStyle = ROOMS[ch].color; ctx.fillRect(sx, sy, TILE, TILE);
        ctx.fillStyle = 'rgba(0,212,255,0.1)'; ctx.fillRect(sx, sy, TILE, 1); ctx.fillRect(sx, sy, 1, TILE);
      } else {
        ctx.fillStyle = '#0a1628'; ctx.fillRect(sx, sy, TILE, TILE);
      }
    }
  }
}

function drawInteractables() {
  interactables.forEach(o => {
    const sx = o.x - camera.x, sy = o.y - camera.y;
    ctx.fillStyle = o.color + '44'; ctx.fillRect(sx, sy, o.w, o.h);
    ctx.strokeStyle = o.color; ctx.lineWidth = 1; ctx.strokeRect(sx+1, sy+1, o.w-2, o.h-2);
    ctx.fillStyle = o.color; ctx.font = '9px Courier'; ctx.fillText(o.label, sx+2, sy-2);
  });
}

function drawNPCs() {
  npcs.forEach(n => {
    const sx = n.x - camera.x, sy = n.y - camera.y;
    ctx.fillStyle = n.color; ctx.fillRect(sx+4, sy+4, TILE-8, TILE-8);
    ctx.fillStyle = '#fff'; ctx.font = '9px Courier'; ctx.fillText(n.name, sx-4, sy-6);
  });
}

function drawPlayer() {
  const sx = player.x - camera.x, sy = player.y - camera.y;
  ctx.fillStyle = '#00d4ff'; ctx.fillRect(sx+6, sy+6, TILE-12, TILE-12);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(sx+6, sy+6, TILE-12, TILE-12);
  // direction indicator
  const cx = sx + TILE/2 + player.dir.x*6, cy = sy + TILE/2 + player.dir.y*6;
  ctx.fillStyle = '#fff'; ctx.fillRect(cx-2, cy-2, 4, 4);
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ==================== LOOP ====================
function update() {
  const now = Date.now();
  const dt = Math.min((now - lastTick) / 1000, 0.1);
  lastTick = now;

  if (!dialogOpen) {
    let dx = 0, dy = 0;
    if (keys['w'] || keys['arrowup']) dy = -1;
    if (keys['s'] || keys['arrowdown']) dy = 1;
    if (keys['a'] || keys['arrowleft']) dx = -1;
    if (keys['d'] || keys['arrowright']) dx = 1;
    if (dx !== 0 || dy !== 0) {
      const len = Math.sqrt(dx*dx+dy*dy); dx /= len; dy /= len;
      player.x += dx * player.speed; player.y += dy * player.speed;
      player.dir = { x: dx, y: dy }; player.moving = true;
    } else { player.moving = false; }
    if (player.x < 0) player.x = 0; if (player.y < 0) player.y = 0;
    if (player.x > MAP[0].length*TILE - TILE) player.x = MAP[0].length*TILE - TILE;
    if (player.y > MAP.length*TILE - TILE) player.y = MAP.length*TILE - TILE;
  }

  // passive income
  credits += rate * dt; totalEarned += rate * dt;

  // camera
  camera.x = player.x + TILE/2 - W/2 + camera.x*0.05;
  camera.y = player.y + TILE/2 - H/2 + camera.y*0.05;
  if (camera.x < 0) camera.x = 0; if (camera.y < 0) camera.y = 0;
  const mx = MAP[0].length*TILE - W, my = MAP.length*TILE - H;
  if (camera.x > mx && mx > 0) camera.x = mx; if (camera.y > my && my > 0) camera.y = my;

  if (screenShake > 0) screenShake *= 0.9; if (screenShake < 0.1) screenShake = 0;
}

function draw() {
  ctx.save();
  if (screenShake) { ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake); }
  ctx.fillStyle = '#05080f'; ctx.fillRect(0, 0, W, H);
  drawMap();
  drawInteractables();
  drawNPCs();
  drawParticles();
  drawPlayer();
  ctx.restore();
}

function loop() {
  update(); draw(); updateHUD();
  requestAnimationFrame(loop);
}

// ==================== INIT ====================
loadGame();
recalc();
updateQuests();
updateHUD();
loop();
setInterval(() => { recalc(); updateQuests(); saveGame(); }, 1000);
</script>
</body>
</html>
