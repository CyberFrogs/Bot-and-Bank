<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot & Bank: Virus Protocol</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { overflow: hidden; font-family: 'Courier New', monospace; background: #000; color: #0ff; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 12px; pointer-events: none; display: flex; justify-content: space-between; z-index: 10; }
  #ui > div { pointer-events: none; }
  .stat { font-size: 14px; margin: 2px 0; }
  .stat span { color: #0f0; font-weight: bold; }
  #message { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; color: #0ff; text-align: center; display: none; text-shadow: 0 0 20px #0ff; pointer-events: none; }
  #controls { position: absolute; bottom: 10px; left: 10px; font-size: 10px; color: #446; pointer-events: none; }
  .brand { position: absolute; bottom: 10px; right: 10px; color: #f0f; font-size: 10px; pointer-events: none; }
  #nextBtn { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); padding: 14px 28px; background: #0ff; color: #000; border: none; font-size: 16px; font-weight: bold; cursor: pointer; display: none; font-family: inherit; border-radius: 6px; }
  #upgradePanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,20,40,0.95); border: 2px solid #0ff; padding: 16px; display: none; font-size: 12px; min-width: 220px; }
  #upgradePanel button { display: block; width: 100%; margin: 4px 0; padding: 6px; background: #003355; color: #0ff; border: 1px solid #0ff; cursor: pointer; font-family: inherit; }
  #upgradePanel button:disabled { background: #222; color: #555; border-color: #333; cursor: not-allowed; }
</style>
</head>
<body>
<div id="ui">
  <div>
    <div class="stat">CREDITS: <span id="credits">0</span></div>
    <div class="stat">LEVEL: <span id="level">1</span></div>
    <div class="stat">CHIPS: <span id="chips">0</span></div>
    <div class="stat">ALLIES: <span id="allies">0</span></div>
  </div>
  <div style="text-align:right;">
    <div class="stat">VIRUSES: <span id="viruses">0</span></div>
    <div class="stat" id="questText">DESTROY ALL VIRUS NODES</div>
  </div>
</div>
<div id="message"></div>
<div id="controls">WASD = Move | SPACE = Attack / Install Chip | E = Upgrade Panel</div>
<div class="brand">@NeuralNetWorth // Virus Protocol</div>
<button id="nextBtn" onclick="nextLevel()">▶ NEXT LEVEL</button>
<div id="upgradePanel">
  <div style="color:#0ff;font-weight:bold;margin-bottom:6px;">⚡ UPGRADES</div>
  <div id="upgradesList"></div>
  <button onclick="closeUpgrades()">Close</button>
</div>

<script>
// ==================== THREE.JS SETUP ====================
let scene, camera, renderer;
let player, playerGroup;
let viruses = [], chipsList = [], npcList = [], particles = [];
let credits = 0, chips = 0, currentLevel = 1;
let keys = {};
let beatLevel = false;
let lastTime = Date.now();
let bulletTime = 0;

const UPGRADES = [
  { id:0, cost:200, name:"Speed Core", desc:"+30% speed", bought:false, apply: () => { playerSpeed = 0.25; } },
  { id:1, cost:500, name:"Shield Gen", desc:"+1 attack power", bought:false, apply: () => { attackPower = 2; } },
  { id:2, cost:1000, name:"Hack Tool", desc:"humans auto-spawn near you", bought:false, apply: () => { autoSpawn = true; } },
];
let playerSpeed = 0.18;
let attackPower = 1;
let autoSpawn = false;

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05080f);
  scene.fog = new THREE.FogExp2(0x05080f, 0.025);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 12, 10);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // lights
  scene.add(new THREE.AmbientLight(0x222244, 0.8));
  const dir = new THREE.DirectionalLight(0x00d4ff, 0.6);
  dir.position.set(20, 40, 20);
  dir.castShadow = true;
  scene.add(dir);

  createPlayer();
  loadLevel(1);

  window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.key === ' ' || e.key === 'Escape') e.preventDefault(); });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
}

function createPlayer() {
  playerGroup = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.7), new THREE.MeshPhongMaterial({ color: 0x00d4ff }));
  body.position.y = 0.7;
  playerGroup.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshPhongMaterial({ color: 0xeeeeee }));
  head.position.y = 1.65;
  playerGroup.add(head);
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.07), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
  eye.position.set(0, 1.75, 0.3);
  playerGroup.add(eye);
  scene.add(playerGroup);
  player = playerGroup;
}

function createBuilding(x, z, w, h, d, color) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.MeshPhongMaterial({ color });
  const b = new THREE.Mesh(g, m);
  b.position.set(x, h/2, z);
  b.castShadow = true;
  b.receiveShadow = true;
  scene.add(b);
  return b;
}

function spawnVirus(x, z, hp) {
  const geo = new THREE.OctahedronGeometry(0.7);
  const mat = new THREE.MeshPhongMaterial({ color: 0xff00ff, emissive: 0x440044, flatShading: true });
  const v = new THREE.Mesh(geo, mat);
  v.position.set(x, 1, z);
  v.userData = { hp: hp || (2 + currentLevel), maxHp: hp || (2 + currentLevel), type: 'virus' };
  scene.add(v);
  viruses.push(v);
  return v;
}

function spawnChip(x, z) {
  const geo = new THREE.BoxGeometry(0.4, 0.1, 0.25);
  const mat = new THREE.MeshPhongMaterial({ color: 0x00ff99, emissive: 0x00ff99, emissiveIntensity: 0.6 });
  const c = new THREE.Mesh(geo, mat);
  c.position.set(x, 0.5, z);
  c.userData = { type: 'chip' };
  scene.add(c);
  chipsList.push(c);
  return c;
}

function spawnHuman(x, z) {
  const geo = new THREE.CylinderGeometry(0.3, 0.3, 1.1);
  const mat = new THREE.MeshPhongMaterial({ color: 0xaaaacc });
  const h = new THREE.Mesh(geo, mat);
  h.position.set(x, 0.55, z);
  h.userData = { type: 'human', powered: false };
  scene.add(h);
  npcList.push(h);
  return h;
}

function loadLevel(n) {
  // clear scene objects
  viruses.forEach(v => scene.remove(v));
  chipsList.forEach(c => scene.remove(c));
  npcList.forEach(h => scene.remove(h));
  viruses = []; chipsList = []; npcList = [];
  scene.children.filter(o => o.userData && o.userData.levelMesh).forEach(o => scene.remove(o));

  currentLevel = n;
  beatLevel = false;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('level').textContent = n;

  const group = new THREE.Group();
  group.userData = { levelMesh: true };

  // ground
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshPhongMaterial({ color: 0x0a0a14 }));
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  group.add(ground);

  // city blocks
  const buildingColors = [0x112233, 0x1a1a2e, 0x16213e, 0x0f3460];
  for (let i = 0; i < 35; i++) {
    const w = 2 + Math.random()*3;
    const d = 2 + Math.random()*3;
    const h = 3 + Math.random() * (4 + n*2);
    createBuilding((Math.random()-0.5)*60, (Math.random()-0.5)*60, w, h, d, buildingColors[Math.floor(Math.random()*buildingColors.length)]);
  }

  // virus nodes
  const vCount = 4 + n * 2;
  for (let i = 0; i < vCount; i++) {
    spawnVirus((Math.random()-0.5)*35, (Math.random()-0.5)*35, 2 + n);
  }
  document.getElementById('viruses').textContent = viruses.length;

  // microchips
  for (let i = 0; i < 3 + n; i++) {
    spawnChip((Math.random()-0.5)*30, (Math.random()-0.5)*30);
  }

  // humans
  for (let i = 0; i < 6; i++) {
    spawnHuman((Math.random()-0.5)*28, (Math.random()-0.5)*28);
  }

  showMessage('LEVEL ' + n + '\nDestroy viruses. Collect chips. Install on humans.');
}

function attack() {
  if (beatLevel) return;
  bulletTime = 8;
  // hit nearest virus
  let nearest = null, best = Infinity;
  viruses.forEach(v => {
    const d = player.position.distanceTo(v.position);
    if (d < best) { best = d; nearest = v; }
  });
  if (nearest && best < 4) {
    nearest.userData.hp -= attackPower;
    nearest.material.emissive.setHex(0xffffff);
    setTimeout(() => { if (nearest) nearest.material.emissive.setHex(0x440044); }, 100);
    if (nearest.userData.hp <= 0) {
      scene.remove(nearest);
      viruses = viruses.filter(v => v !== nearest);
      // drop chip
      spawnChip(nearest.position.x, nearest.position.z);
      spawnParticles(nearest.position, 20, 0x00ff99);
      document.getElementById('viruses').textContent = viruses.length;
      if (viruses.length === 0) clearLevel();
    }
  }
}

function installChip() {
  const idx = chipsList.findIndex(c => player.position.distanceTo(c.position) < 2.5);
  if (idx < 0) return;
  const c = chipsList[idx];
  scene.remove(c);
  chipsList.splice(idx, 1);
  chips++;
  showToast('+1 Microchip');
  // find nearest human
  const near = npcList.find(h => !h.userData.powered && player.position.distanceTo(h.position) < 5);
  if (near) {
    near.userData.powered = true;
    near.material.color.setHex(0x00ff99);
    near.material.emissive.setHex(0x00ff00);
    near.material.emissiveIntensity = 0.4;
    showToast('Human upgraded! Producing credits.');
  }
  document.getElementById('chips').textContent = chips;
}

function interact() {
  if (document.getElementById('upgradePanel').style.display === 'block') {
    closeUpgrades();
    return;
  }
  if (beatLevel) return;
  
  // near human with chip -> auto install? no, space for attack, shift for chip
  // space = attack, 'f' = install
  const hasChipNear = chipsList.some(c => player.position.distanceTo(c.position) < 2.5);
  if (hasChipNear) {
    installChip();
  }
}

function update() {
  const now = Date.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  bulletTime = Math.max(0, bulletTime - dt * 10);

  // movement
  let mx = 0, mz = 0;
  if (keys['w']) mz -= 1;
  if (keys['s']) mz += 1;
  if (keys['a']) mx -= 1;
  if (keys['d']) mx += 1;
  const len = Math.sqrt(mx*mx + mz*mz) || 1;
  player.position.x += (mx/len) * playerSpeed;
  player.position.z += (mz/len) * playerSpeed;
  player.rotation.y += (Math.atan2(mx, mz) - player.rotation.y) * 0.2;

  // camera follow
  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 10;
  camera.position.y = 8 + Math.sin(now*0.001)*0.5;
  camera.lookAt(player.position.x, 1, player.position.z);

  // passive from powered humans
  npcList.filter(h => h.userData.powered).forEach(h => {
    credits += dt * (2 * currentLevel);
  });
  document.getElementById('credits').textContent = Math.floor(credits);
  document.getElementById('allies').textContent = npcList.filter(h => h.userData.powered).length;

  // animate viruses
  viruses.forEach(v => {
    v.rotation.y += dt * 2;
    v.rotation.z += dt;
    // bob
    v.position.y = 1 + Math.sin(now*0.003 + v.id)*0.2;
  });

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    p.mesh.material.opacity = Math.max(0, p.life);
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
  }

  renderer.render(scene, camera);
}

function animate() {
  requestAnimationFrame(animate);
  update();
}

function spawnParticles(pos, count, color) {
  for (let i = 0; i < count; i++) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.1), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 }));
    m.position.copy(pos);
    m.position.x += (Math.random()-0.5)*2;
    m.position.y += Math.random()*2;
    m.position.z += (Math.random()-0.5)*2;
    scene.add(m);
    particles.push({ mesh: m, vel: new THREE.Vector3((Math.random()-0.5)*4, Math.random()*4, (Math.random()-0.5)*4), life: 0.8 });
  }
}

function showMessage(msg) {
  const el = document.getElementById('message');
  el.innerHTML = msg.replace(/\n/g, '<br>');
  el.style.display = 'block';
}

function showToast(msg) {
  showMessage(msg);
  setTimeout(() => { document.getElementById('message').style.display = 'none'; }, 2000);
}

function clearLevel() {
  beatLevel = true;
  const reward = currentLevel * 500;
  credits += reward;
  showMessage('LEVEL ' + currentLevel + ' CLEARED!\n+' + reward + ' credits');
  document.getElementById('nextBtn').style.display = 'block';
}

function nextLevel() {
  loadLevel(currentLevel + 1);
}

function openUpgrades() {
  const panel = document.getElementById('upgradePanel');
  const list = document.getElementById('upgradesList');
  list.innerHTML = UPGRADES.map((u, i) => {
    const cost = Math.floor(u.cost * (1 + currentLevel * 0.5));
    return `<button ${u.bought ? 'disabled' : ''} onclick="buyUpgrade(${i}, ${cost})">${u.icon} ${u.name} - ${u.desc} (${cost})</button>`;
  }).join('');
  panel.style.display = 'block';
}

function buyUpgrade(i, cost) {
  if (credits < cost) return;
  credits -= cost;
  UPGRADES[i].bought = true;
  UPGRADES[i].apply();
  showToast('Upgrade installed: ' + UPGRADES[i].name);
  closeUpgrades();
  renderUpgradePanel();
}

function closeUpgrades() {
  document.getElementById('upgradePanel').style.display = 'none';
}

function renderUpgradePanel() {
  // noop on this simple version
}

window.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Spacebar') attack();
  if (e.key.toLowerCase() === 'f') interact();
  if (e.key.toLowerCase() === 'e') openUpgrades();
});

// ==================== SAVE SYSTEM ====================
function saveGame() {
  const data = { credits, chips, currentLevel, upgrades: UPGRADES.map(u => u.bought) };
  try { localStorage.setItem('virusprotocol', JSON.stringify(data)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('virusprotocol');
    if (!raw) return;
    const d = JSON.parse(raw);
    credits = d.credits || 0;
    chips = d.chips || 0;
    if (d.currentLevel) loadLevel(d.currentLevel);
    if (d.upgrades) d.upgrades.forEach((b, i) => { if (UPGRADES[i]) { UPGRADES[i].bought = b; UPGRADES[i].apply(); } });
  } catch(e) {}
}

setInterval(saveGame, 5000);

// ==================== INIT ====================
loadGame();
init();
</script>
</body>
</html>
