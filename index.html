<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bot & Bank: Virus Protocol - Zurich</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  body { overflow: hidden; font-family: 'Courier New', monospace; background: #000; color: #aaddff; }
  #game { display: block; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 10px 14px; pointer-events: none; display: flex; justify-content: space-between; z-index: 10; text-shadow: 0 0 6px #000; }
  #ui > * { pointer-events: none; }
  .panel { background: rgba(0,8,16,0.85); border: 1px solid #00d4ff33; padding: 10px 14px; border-radius: 6px; pointer-events: auto; }
  .stat { font-size: 13px; margin: 2px 0; }
  .stat span { color: #00ff99; font-weight: bold; }
  .bar-wrap { width: 140px; height: 8px; background: #112233; border-radius: 4px; overflow: hidden; margin-top: 3px; }
  .bar { height: 100%; background: linear-gradient(90deg,#00d4ff,#00ff99); width: 100%; transition: width .2s; }
  #centerMsg { position: absolute; top: 38%; left: 50%; transform: translate(-50%,-50%); font-size: 26px; color: #00d4ff; text-align: center; text-shadow: 0 0 18px #00d4ff; display: none; }
  #dialog { position: absolute; bottom: 18%; left: 50%; transform: translateX(-50%); background: rgba(0,12,24,0.96); border: 2px solid #00d4ff; padding: 14px 18px; border-radius: 10px; font-size: 13px; max-width: 92%; text-align: center; display: none; box-shadow: 0 0 30px rgba(0,212,255,0.25); }
  #dialog button { margin: 6px 4px; padding: 8px 14px; background: #00d4ff; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: inherit; }
  #dialog button:hover { background: #00eeff; }
  #controls { position: absolute; bottom: 8px; left: 10px; font-size: 10px; color: #445; }
  .brand { position: absolute; bottom: 8px; right: 10px; color: #f0f; font-size: 10px; }
  #hotbar { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; pointer-events: auto; }
  .hslot { width: 44px; height: 44px; background: rgba(0,20,40,0.9); border: 1px solid #00d4ff55; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
  .hslot.active { border-color: #00d4ff; box-shadow: 0 0 12px #00d4ff55; }
  #skillsPanel, #invPanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,12,24,0.96); border: 2px solid #00d4ff; padding: 14px; display: none; font-size: 12px; min-width: 240px; border-radius: 8px; }
  #skillsPanel h3, #invPanel h3 { color: #00d4ff; margin-bottom: 6px; }
  #skillsPanel button, #invPanel button { display: block; width: 100%; margin: 3px 0; padding: 6px; background: #003355; color: #0ff; border: 1px solid #00d4ff55; cursor: pointer; font-family: inherit; }
  #skillsPanel button:disabled, #invPanel button:disabled { background: #111; color: #333; border-color: #222; cursor: not-allowed; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="panel">
    <div class="stat">🤖 ZURICH PROTOCOL</div>
    <div class="stat">HP: <span id="hp">100</span>/<span id="hpmax">100</span></div>
    <div class="bar-wrap"><div class="bar" id="hpbar"></div></div>
    <div class="stat">CREDITS: <span id="credits">0</span></div>
    <div class="stat">CHIPS: <span id="chips">0</span></div>
    <div class="stat">LEVEL: <span id="level">1</span></div>
    <div class="stat">SKILL: <span id="skname">None</span></div>
  </div>
  <div class="panel" style="text-align:right;">
    <div class="stat">VIRUSES: <span id="viruses">0</span></div>
    <div class="stat">ALLIES: <span id="allies">0</span></div>
    <div class="stat" id="qtext">Objective: Clear district</div>
  </div>
</div>
<div id="centerMsg"></div>
<div id="dialog"></div>
<div id="hotbar">
  <div class="hslot" onclick="selectSlot(0)" title="Attack">⚔️</div>
  <div class="hslot" onclick="selectSlot(1)" title="Chip Install">💾</div>
  <div class="hslot" onclick="selectSlot(2)" title="Hack">🔓</div>
  <div class="hslot" onclick="selectSlot(3)" title="Shield">🛡️</div>
  <div class="hslot" onclick="openSkills()" title="Skills">⭐</div>
  <div class="hslot" onclick="openInv()" title="Items">🎒</div>
</div>
<div id="skillsPanel"><h3>Skills</h3><div id="skillsList"></div><button onclick="closeSkills()">Close</button></div>
<div id="invPanel"><h3>Items</h3><div id="invList"></div><button onclick="closeInv()">Close</button></div>
<div id="controls">WASD = Move | SPACE = Action | E = Interact | I = Skills | Q = Items | 1-4 = Hotbar</div>
<div class="brand">@NeuralNetWorth // Zurich Protocol</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d'); // unused but kept for structure
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04060a);
scene.fog = new THREE.FogExp2(0x04060a, 0.018);

const camera = new THREE.PerspectiveCamera(68, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, 14, 14);

// lighting
scene.add(new THREE.AmbientLight(0x223344, 0.7));
const sun = new THREE.DirectionalLight(0xaaccff, 0.6);
sun.position.set(40, 60, 30);
sun.castShadow = true;
scene.add(sun);

const cityLight = new THREE.PointLight(0x00d4ff, 0.6, 60);
scene.add(cityLight);

// ==================== STATE ====================
let credits = 0, chips = 0, level = 1, xp = 0;
let hp = 100, maxHp = 100, shield = 0;
let activeSlot = 0;
let lastTime = performance.now();
let viruses = [], bullets = [], particles = [], humans = [], interactables = [], buildingObjects = [];
let player, playerGroup;
let nearInteractable = null;
let dialogOpen = false;
let insideBuilding = null; // if inside, this is building ref
let skillPoints = 0;
let runeUnlocked = false;
letaim = 0;

const skills = [
  { id:0, name:'Speed Surge', cost:1, bought:false, desc:'+40% move speed', icon:'⚡', apply: () => {} },
  { id:1, name:'EMP Burst', cost:2, bought:false, desc:'Shockwave stuns viruses', icon:'💫', apply: () => {} },
  { id:2, name:'Hack Master', cost:2, bought:false, desc:'Humans give 2x credits', icon:'🔓', apply: () => {} },
  { id:3, name:'Fortify', cost:1, bought:false, desc:'+50 max HP', icon:'🛡️', apply: () => { maxHp = 150; hp = Math.min(hp+50, maxHp); } },
];

const hotbarActions = [
  { name:'Attack', use: () => attack() },
  { name:'Install', use: () => tryInstallChip() },
  { name:'Hack', use: () => hackHuman() },
  { name:'Shield', use: () => activateShield() },
];

function addItem(name, count=1) {
  const el = document.getElementById('invList');
  const row = document.createElement('div');
  row.textContent = `${name} x${count}`;
  el.appendChild(row);
}

function openSkills() { const p=document.getElementById('skillsPanel'); p.style.display='block'; renderSkills(); }
function closeSkills() { document.getElementById('skillsPanel').style.display='none'; }
function openInv() { const p=document.getElementById('invPanel'); p.style.display='block'; renderInv(); }
function closeInv() { document.getElementById('invPanel').style.display='none'; }

function renderSkills() {
  document.getElementById('skillsList').innerHTML = skills.map((s,i) => {
    const can = skillPoints >= s.cost && !s.bought;
    return `<button ${can?'':'disabled'} onclick="buySkill(${i})">${s.icon} ${s.name} (${s.cost} pts) — ${s.desc}</button>`;
  }).join('');
}
function buySkill(i) {
  const s = skills[i];
  if (skillPoints < s.cost || s.bought) return;
  skillPoints -= s.cost; s.bought = true; s.apply();
  showToast('Skill learned: ' + s.name);
}

function renderInv() {
  const inv = document.getElementById('invList');
  inv.innerHTML = '<div>🔋 Battery x' + Math.floor(Math.random()*99) + '</div><div>🛡️ Shield Module x1</div>';
}
window.buySkill = buySkill;

function selectSlot(i) {
  activeSlot = i;
  document.querySelectorAll('.hslot').forEach((el,idx) => el.classList.toggle('active', idx===i));
  document.getElementById('skname').textContent = hotbarActions[i]?.name || '';
}
window.selectSlot = selectSlot;
window.openSkills = openSkills; window.closeSkills = closeSkills;
window.openInv = openInv; window.closeInv = closeInv;

// ==================== PLAYER ROBOT ====================
function createRobot() {
  playerGroup = new THREE.Group();
  const matBody = new THREE.MeshPhongMaterial({ color: 0x8899aa });
  const matAccent = new THREE.MeshPhongMaterial({ color: 0x00d4ff, emissive: 0x002233 });
  const matEye = new THREE.MeshBasicMaterial({ color: 0xff0000 });

  // legs
  [-0.25, 0.25].forEach(x => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.7, 0.25), matBody);
    leg.position.set(x, 0.35, 0);
    playerGroup.add(leg);
  });
  // torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.5), matBody);
  torso.position.y = 1.1;
  playerGroup.add(torso);
  // chest plate
  const chest = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.5, 0.12), matAccent);
  chest.position.set(0, 1.25, 0.26);
  playerGroup.add(chest);
  // arms
  [-0.55, 0.55].forEach(x => {
    const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.12), matAccent);
    shoulder.position.set(x, 1.45, 0);
    playerGroup.add(shoulder);
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.6, 0.18), matBody);
    arm.position.set(x, 1.05, 0);
    playerGroup.add(arm);
  });
  // head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.4, 0.45), matBody);
  head.position.y = 1.85;
  playerGroup.add(head);
  // eyes
  [-0.1, 0.1].forEach(x => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06), matEye);
    eye.position.set(x, 1.9, 0.22);
    playerGroup.add(eye);
  });
  // antenna
  const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.25), matAccent);
  ant.position.y = 2.15;
  playerGroup.add(ant);
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.06), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
  bulb.position.y = 2.3;
  playerGroup.add(bulb);

  scene.add(playerGroup);
  player = playerGroup;
}

// ==================== CITY GENERATION ====================
const CITY_SIZE = 140;
const BLOCK = 12;
const STREET = 5;

function createBuilding(x, z, w, d, h, color, hasInterior=false) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshPhongMaterial({ color, flatShading: true });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h/2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  buildingObjects.push({ mesh, x, z, w, d, h, hasInterior });

  // windows
  const winGeo = new THREE.PlaneGeometry(0.8, 0.6);
  const winMat = new THREE.MeshBasicMaterial({ color: 0xaaddff, side: THREE.DoubleSide });
  for (let wy = 1.5; wy < h - 1; wy += 2.5) {
    for (let wx = -w/2 + 1.5; wx < w/2; wx += 2.2) {
      const win = new THREE.Mesh(winGeo, winMat);
      win.position.set(x + wx, wy, z + d/2 + 0.01);
      scene.add(win);
    }
  }
  return mesh;
}

function buildCity() {
  // ground
  const groundGeo = new THREE.PlaneGeometry(CITY_SIZE*2, CITY_SIZE*2);
  const groundMat = new THREE.MeshPhongMaterial({ color: 0x0a0a12 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  // streets / blocks
  const colors = [0x112233, 0x0f1a2e, 0x112244, 0x0a1628, 0x16213e];
  for (let bx = -CITY_SIZE/2; bx < CITY_SIZE/2; bx += BLOCK + STREET) {
    for (let bz = -CITY_SIZE/2; bz < CITY_SIZE/2; bz += BLOCK + STREET) {
      if (Math.random() < 0.08) continue; // parks
      const h = 6 + Math.random() * 30;
      const w = BLOCK - 1 - Math.random()*2;
      const d = BLOCK - 1 - Math.random()*2;
      createBuilding(bx + BLOCK/2, bz + BLOCK/2, w, d, h, colors[Math.floor(Math.random()*colors.length)]);
    }
  }

  // alpine backdrop
  for (let i = 0; i < 12; i++) {
    const m = new THREE.Mesh(new THREE.ConeGeometry(15+Math.random()*20, 40+Math.random()*50, 4), new THREE.MeshPhongMaterial({ color: 0x1a2a3a, flatShading: true }));
    m.position.set((Math.random()-0.5)*300, 0, -120 - Math.random()*60);
    scene.add(m);
  }
}

function spawnHuman(x, z, role) {
  const geo = new THREE.CylinderGeometry(0.28, 0.28, 1.0);
  const mat = new THREE.MeshPhongMaterial({ color: 0xbbccdd });
  const h = new THREE.Mesh(geo, mat);
  h.position.set(x, 0.5, z);
  h.userData = { type:'human', role, powered:false, dialog: role==='scientist'?['The virus is adapting!','Bring chips to infected terminals.']:['Danke!','Stay safe out there.'] };
  scene.add(h);
  humans.push(h);
  return h;
}

function spawnVirusNode(x, z, isBoss=false) {
  const size = isBoss ? 1.8 : 0.7;
  const geo = isBoss ? new THREE.IcosahedronGeometry(size) : new THREE.OctahedronGeometry(size);
  const mat = new THREE.MeshPhongMaterial({ color: isBoss?0xff0000:0xff00ff, emissive: isBoss?0x440000:0x440044, flatShading: true });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, isBoss?3:1, z);
  m.userData = { type:'virus', hp: isBoss?50+level*20:2+level, maxHp: isBoss?50+level*20:2+level, isBoss };
  scene.add(m);
  viruses.push(m);
  return m;
}

function spawnChipPickup(x, z) {
  const geo = new THREE.BoxGeometry(0.35, 0.1, 0.25);
  const mat = new THREE.MeshPhongMaterial({ color: 0x00ff99, emissive: 0x00ff99, emissiveIntensity: 0.7 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, 0.6, z);
  m.userData = { type:'chip' };
  scene.add(m);
  interactables.push(m);
  return m;
}

function spawnBattery(x, z) {
  const geo = new THREE.CylinderGeometry(0.15, 0.15, 0.4);
  const mat = new THREE.MeshPhongMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 0.5 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, 0.2, z);
  m.userData = { type:'battery' };
  scene.add(m);
  interactables.push(m);
  return m;
}

// ==================== LEVEL MANAGEMENT ====================
function loadLevel(n) {
  // cleanup
  viruses.forEach(v => scene.remove(v)); viruses = [];
  interactables.forEach(o => scene.remove(o)); interactables = [];
  humans.forEach(h => scene.remove(h)); humans = [];
  buildingObjects = [];
  while(scene.children.length > 20) scene.remove(scene.children[scene.children.length-1]);

  level = n;
  document.getElementById('level').textContent = n;
  showMessage(`DISTRICT ${n}\nDefeat the virus core. Rescue humans.`);

  buildCity();

  // spawn viruses
  const vCount = 4 + n * 3;
  for (let i = 0; i < vCount; i++) {
    spawnVirusNode((Math.random()-0.5)*80, (Math.random()-0.5)*80);
  }

  // spawn boss every 3 levels
  if (n % 3 === 0) {
    spawnVirusNode(0, 0, true);
    document.getElementById('qtext').textContent = '⚠️ BOSS DETECTED';
  } else {
    document.getElementById('qtext').textContent = 'Objective: Clear district';
  }

  // spawn humans
  for (let i = 0; i < 8; i++) spawnHuman((Math.random()-0.5)*70, (Math.random()-0.5)*70, Math.random()<0.3?'scientist':'civilian');

  // spawn chips/batteries
  for (let i = 0; i < 4; i++) spawnChipPickup((Math.random()-0.5)*60, (Math.random()-0.5)*60);
  for (let i = 0; i < 3; i++) spawnBattery((Math.random()-0.5)*60, (Math.random()-0.5)*60);

  updateHUD();
}

function clearLevel() {
  showMessage(`DISTRICT ${level} CLEARED!`);
  setTimeout(() => loadLevel(level + 1), 2500);
}

// ==================== COMBAT / INTERACTION ====================
function attack() {
  if (!player) return;
  // raycast-ish: find nearest virus in front
  const pPos = player.position;
  let nearest = null, best = 18;
  viruses.forEach(v => {
    const d = pPos.distanceTo(v.position);
    if (d < best) { best = d; nearest = v; }
  });
  if (!nearest) return;

  // bullet particle
  const geo = new THREE.SphereGeometry(0.15);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00d4ff });
  const b = new THREE.Mesh(geo, mat);
  b.position.copy(pPos); b.position.y = 1.2;
  scene.add(b); bullets.push({ mesh:b, vel: pPos.clone().sub(nearest.position).normalize().multiplyScalar(-0.8) });

  setTimeout(() => {
    scene.remove(b);
    bullets = bullets.filter(x => x.mesh !== b);
  }, 600);

  nearest.userData.hp -= 1;
  hitFlash(nearest);
  if (nearest.userData.hp <= 0) {
    scene.remove(nearest);
    viruses = viruses.filter(v => v !== nearest);
    spawnParticles(nearest.position, 25, nearest.userData.isBoss ? 0xff4444 : 0x00ff99);
    credits += nearest.userData.isBoss ? 1000 : 50;
    if (viruses.filter(v=>!v.userData.isBoss).length === 0 && !viruses.some(v=>v.userData.isBoss)) {
      clearLevel();
    }
  }
  updateHUD();
}

function tryInstallChip() {
  const near = interactables.find(o => o.userData.type === 'chip' && player.position.distanceTo(o.position) < 3);
  if (!near) { showToast('No chip nearby'); return; }
  scene.remove(near);
  interactables = interactables.filter(o => o !== near);
  chips++;
  const civ = humans.find(h => !h.userData.powered);
  if (civ) {
    civ.userData.powered = true;
    civ.material.color.setHex(0x00ff99);
    civ.material.emissive.setHex(0x004411);
    showToast('Human powered! Generating credits.');
  } else {
    showToast('Chip collected. Find a human.');
  }
  document.getElementById('chips').textContent = chips;
}

function hackHuman() {
  const near = humans.find(h => player.position.distanceTo(h.position) < 3 && !h.userData.powered);
  if (!near) { showToast('No hackable human nearby'); return; }
  near.userData.powered = true;
  near.material.color.setHex(0x00aaff);
  near.material.emissive.setHex(0x002244);
  showToast('Hacked ally. Credits x3 for ' + (skills[2].bought?'10s':'5s'));
}

function activateShield() {
  shield = 30;
  showToast('Shield active 30s');
}

function interact() {
  if (dialogOpen) { closeDialog(); return; }
  const nearObj = interactables.find(o => player.position.distanceTo(o.position) < 3);
  if (nearObj && nearObj.userData.type === 'battery') {
    hp = Math.min(maxHp, hp + 25);
    scene.remove(nearObj);
    interactables = interactables.filter(o => o !== nearObj);
    showToast('+25 HP');
    updateHUD();
    return;
  }
  const nearHuman = humans.find(h => player.position.distanceTo(h.position) < 3);
  if (nearHuman) {
    openDialog(nearHuman.userData.role==='scientist'?'Scientist':'Civilian', nearHuman.userData.dialog);
    return;
  }
}

function hitFlash(mesh) {
  const old = mesh.material.emissive.getHex();
  mesh.material.emissive.setHex(0xffffff);
  setTimeout(() => mesh.material.emissive.setHex(old), 80);
}

function spawnParticles(pos, count, color) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
    const mat = new THREE.MeshBasicMaterial({ color, transparent:true });
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(pos);
    m.position.x += (Math.random()-0.5)*3;
    m.position.y += Math.random()*2;
    m.position.z += (Math.random()-0.5)*3;
    scene.add(m);
    particles.push({ mesh:m, vel: new THREE.Vector3((Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5), life:1 });
  }
}

function showMessage(txt) {
  const el = document.getElementById('centerMsg');
  el.innerHTML = txt.replace(/\n/g, '<br>');
  el.style.display = 'block';
  if (!txt) el.style.display = 'none';
}
function showToast(txt) { showMessage(txt); setTimeout(()=>{ if(!dialogOpen) showMessage(''); }, 1800); }

function openDialog(title, lines) {
  dialogOpen = true;
  const d = document.getElementById('dialog');
  d.innerHTML = `<div style="color:#00d4ff;font-weight:bold;margin-bottom:4px;">${title}</div>` + lines.join('<br>') + `<br><button onclick="closeDialog()">Close</button>`;
  d.style.display = 'block';
}
function closeDialog() { dialogOpen = false; document.getElementById('dialog').style.display='none'; showMessage(''); }
window.closeDialog = closeDialog;

function updateHUD() {
  document.getElementById('credits').textContent = Math.floor(credits);
  document.getElementById('hp').textContent = Math.floor(hp);
  document.getElementById('hpmax').textContent = maxHp;
  document.getElementById('hpbar').style.width = Math.max(0, hp/maxHp*100)+'%';
  document.getElementById('chips').textContent = chips;
  document.getElementById('viruses').textContent = viruses.filter(v=>!v.userData.isBoss).length;
  document.getElementById('allies').textContent = humans.filter(h=>h.userData.powered).length;
}

// ==================== CONTROLS ====================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); useActive(); }
  if (e.key.toLowerCase() === 'e') interact();
  if (e.key.toLowerCase() === 'i') openSkills();
  if (e.key.toLowerCase() === 'q') openInv();
  hotbarActions.forEach((_, i) => { if (e.key === String(i+1)) selectSlot(i); });
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function useActive() { hotbarActions[activeSlot]?.use(); }

// ==================== MAIN LOOP ====================
function update(dt) {
  if (!player) return;
  // movement
  let mx = 0, mz = 0;
  const sp = skills[0].bought ? 0.22 : 0.16;
  if (keys['w'] || keys['arrowup']) mz -= 1;
  if (keys['s'] || keys['arrowdown']) mz += 1;
  if (keys['a'] || keys['arrowleft']) mx -= 1;
  if (keys['d'] || keys['arrowright']) mx += 1;
  const len = Math.sqrt(mx*mx + mz*mz) || 1;
  player.position.x += (mx/len) * sp;
  player.position.z += (mz/len) * sp;
  player.rotation.y += (Math.atan2(mx, mz) - player.rotation.y) * 0.25;

  // camera follow
  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 12;
  camera.position.y = 10 + Math.sin(Date.now()*0.001)*0.4;
  camera.lookAt(player.position.x, 1.2, player.position.z);

  // passive ally income
  humans.filter(h => h.userData.powered).forEach(h => {
    credits += dt * (skills[2].bought ? 6 : 3);
  });

  // virus behavior
  viruses.forEach(v => {
    v.rotation.y += dt * 2.5;
    v.position.y = (v.userData.isBoss ? 3 : 1) + Math.sin(Date.now()*0.004 + v.id)*0.3;
    if (!v.userData.isBoss && v.position.distanceTo(player.position) < 1.5) {
      hp -= dt * 8;
      if (shield > 0) { shield -= dt*10; } else { hp -= dt*8; }
    }
    if (v.userData.isBoss) {
      // boss charges
      const d = player.position.distanceTo(v.position);
      if (d < 8) v.position.add(player.position.clone().sub(v.position).normalize().multiplyScalar(-dt*2));
    }
  });

  // bullet travel
  bullets.forEach(b => {
    b.mesh.position.add(b.vel.clone().multiplyScalar(dt));
  });

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    p.mesh.material.opacity = Math.max(0, p.life);
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i,1); }
  }

  // shield decay
  if (shield > 0) shield = Math.max(0, shield - dt);

  if (hp <= 0) {
    hp = maxHp; credits = Math.max(0, credits - 200); player.position.set(0,0,0);
    showToast('💀 System reboot. -200 credits');
  }

  updateHUD();
}

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastTime)/1000, 0.1);
  lastTime = now;
  update(dt);
  renderer.render(scene, camera);
}

// ==================== SAVE / LOAD ====================
function saveGame() {
  const data = { credits, chips, level, hp, maxHp, skillPoints, skills: skills.map(s=>s.bought), xp };
  try { localStorage.setItem('zurichprotocol', JSON.stringify(data)); } catch(e) {}
}
function loadGame() {
  try {
    const raw = localStorage.getItem('zurichprotocol');
    if (!raw) return;
    const d = JSON.parse(raw);
    credits = d.credits||0; chips = d.chips||0; level = d.level||1;
    hp = d.hp||100; maxHp = d.maxHp||100; skillPoints = d.skillPoints||0; xp = d.xp||0;
    if (d.skills) d.skills.forEach((b,i) => { if (skills[i]) skills[i].bought = b; });
    loadLevel(level);
  } catch(e) {}
}
setInterval(saveGame, 4000);

// ==================== INIT ====================
createRobot();
loadLevel(level);
animate();
</script>
